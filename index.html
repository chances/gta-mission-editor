<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>GTA Mission Editor</title>
    <link rel="stylesheet" href="src/styles/main.css">
  </head>
  <body>
    <hgroup id="toolbar">
      <h1>GTA Mission Editor</h1>
      <nav>
        <span>
          Open source on
          <a href="https://github.com/chances/gta-mission-editor?tab=readme-ov-file#readme">GitHub</a>
        </span>
        <span>
          Made with ❤ by
          <a href="https://chancesnow.me">Chance Snow</a>
        </span>
      </nav>
    </hgroup>

    <div id="main">
      <div id="blocklyDiv"></div>
      <div id="outputPanel">
        <h2 class="panel-header">Mission Metadata</h2>
        <div class="field">
          <label for="missionName">Title</label>
          <input id="missionName" type="text" value="My Mission" />
        </div>
        <div class="field">
          <label for="missionDescription">Description</label>
          <input id="missionDescription" type="text" value="Get to the church on time" />
        </div>
        <div class="field">
          <label for="missionReward">Reward</label>
          <input id="missionReward" type="number" min="0" value="500" />
        </div>
        <hgroup>
          <h2 class="panel-header">Generated Script</h2>
          <button id="copyBtn">Copy</button>
        </hgroup>
        <pre id="codeOutput"></pre>
      </div>
    </div>

    <script type="module" src="src/main.ts"></script>
  </body>
</html>
